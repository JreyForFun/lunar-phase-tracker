<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Phase Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="moon-canvas"></canvas>

    <div id="info-card">
        <div id="phase-header">
            <span id="phase-icon">🌕</span>
            <span id="phase-name">Full Moon</span>
        </div>

        <div id="stats">
            <div class="stat">
                <span class="label">Illumination</span>
                <span id="illumination" class="value">-</span>
            </div>
            <div class="stat">
                <span class="label">Cycle day</span>
                <span id="cycle-day" class="value">-</span>
            </div>
            <div class="stat">
                <span class="label">Next full moon</span>
                <span id="next-full" class="value">-</span>
            </div>
        </div>
        <div id="current-date"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
