    <!-- TODO 6 — Build the info card
         WHAT: A panel at the bottom of the screen showing phase data.
               It has three sections inside:
               1. A header with the phase icon and name
               2. A stats row with three stat blocks
               3. A date line at the bottom

         Build it like this exactly (ids matter — JS finds them by id):

         <div id="info-card">

             <div id="phase-header">
                 <span id="phase-icon">🌕</span>
                 <span id="phase-name">Full Moon</span>
             </div>

             <div id="stats">
                 <div class="stat">
                     <span class="label">Illumination</span>
                     <span id="illumination" class="value">—</span>
                 </div>
                 <div class="stat">
                     <span class="label">Cycle day</span>
                     <span id="cycle-day" class="value">—</span>
                 </div>
                 <div class="stat">
                     <span class="label">Next full moon</span>
                     <span id="next-full" class="value">—</span>
                 </div>
             </div>

             <div id="current-date"></div>

         </div>

         WHY span vs div inside the stat:
           span is inline — it stays on the same line as its siblings.
           div is block — it always starts on a new line.
           label and value sit on different lines because of CSS (flex-direction: column),
           not because of the HTML element type.
